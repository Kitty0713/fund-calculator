<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>基金持仓成本计算器 · 导航版</title>
    <style>
        :root {
            --bg: #f1f5f9;
            --surface: #ffffff;
            --surface-alt: #f8fafc;
            --primary: #4f46e5;
            --primary-light: #eef2ff;
            --primary-hover: #4338ca;
            --accent: #06b6d4;
            --accent-light: #ecfeff;
            --success: #10b981;
            --success-light: #ecfdf5;
            --warning: #f59e0b;
            --warning-light: #fffbeb;
            --danger: #ef4444;
            --danger-light: #fef2f2;
            --text: #1e293b;
            --text-secondary: #64748b;
            --text-muted: #94a3b8;
            --border: #e2e8f0;
            --border-light: #f1f5f9;
            --shadow-xs: 0 1px 2px rgba(0, 0, 0, 0.03);
            --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.06), 0 1px 2px rgba(0, 0, 0, 0.04);
            --shadow: 0 4px 6px rgba(0, 0, 0, 0.05), 0 2px 4px rgba(0, 0, 0, 0.04);
            --shadow-md: 0 8px 15px rgba(0, 0, 0, 0.06), 0 3px 6px rgba(0, 0, 0, 0.04);
            --shadow-lg: 0 16px 30px rgba(0, 0, 0, 0.07), 0 6px 10px rgba(0, 0, 0, 0.04);
            --shadow-xl: 0 20px 40px rgba(0, 0, 0, 0.08);
            --radius-xs: 4px;
            --radius-sm: 8px;
            --radius: 12px;
            --radius-lg: 16px;
            --radius-xl: 20px;
            --radius-2xl: 24px;
            --font-mono: 'SF Mono', 'Cascadia Code', 'JetBrains Mono', 'Consolas', 'Monaco', 'Menlo', monospace;
            --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            --transition-fast: 0.15s cubic-bezier(0.4, 0, 0.2, 1);
            --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            --transition-slow: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            --max-width: 1200px;
            --nav-height: 64px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body {
            font-family: var(--font-sans);
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            letter-spacing: -0.1px;
        }

        /* ==================== 导航栏 ==================== */
        .navbar {
            position: sticky;
            top: 0;
            z-index: 1000;
            background: rgba(255, 255, 255, 0.88);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border-bottom: 1px solid var(--border);
            box-shadow: var(--shadow-xs);
            transition: var(--transition);
            height: var(--nav-height);
        }
        .navbar-inner {
            max-width: var(--max-width);
            margin: 0 auto;
            padding: 0 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 100%;
            gap: 10px;
        }
        .nav-brand {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 700;
            font-size: 1.1rem;
            color: var(--text);
            letter-spacing: -0.4px;
            white-space: nowrap;
            cursor: default;
            user-select: none;
            flex-shrink: 0;
        }
        .nav-brand .brand-icon {
            width: 38px;
            height: 38px;
            border-radius: var(--radius-sm);
            background: linear-gradient(135deg, var(--primary) 0%, #7c3aed 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 1.2rem;
            box-shadow: 0 4px 12px rgba(79, 70, 229, 0.25);
            flex-shrink: 0;
        }
        .nav-tabs {
            display: flex;
            gap: 4px;
            background: #f1f5f9;
            border-radius: 28px;
            padding: 4px;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
            flex-shrink: 1;
            flex-wrap: nowrap;
        }
        .nav-tabs::-webkit-scrollbar { display: none; }
        .nav-tab {
            padding: 8px 16px;
            border-radius: 24px;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            border: none;
            background: transparent;
            color: var(--text-secondary);
            transition: var(--transition-fast);
            white-space: nowrap;
            letter-spacing: -0.1px;
            position: relative;
            font-family: inherit;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            user-select: none;
            flex-shrink: 0;
        }
        .nav-tab:hover { color: var(--text); background: rgba(255,255,255,0.6); }
        .nav-tab.active {
            background: #fff;
            color: var(--primary);
            box-shadow: var(--shadow-sm);
            font-weight: 600;
        }
        .nav-tab .tab-icon { font-size: 1rem; line-height: 1; }
        .nav-actions { display: flex; gap: 6px; flex-shrink: 0; }
        .btn-icon {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: 1.5px solid var(--border);
            background: #fff;
            cursor: pointer;
            font-size: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition-fast);
            color: var(--text-secondary);
            position: relative;
        }
        .btn-icon:hover { background: #f8fafc; border-color: #cbd5e1; color: var(--text); box-shadow: var(--shadow-sm); }
        .btn-icon .badge-dot {
            position: absolute;
            top: 4px; right: 4px;
            width: 8px; height: 8px;
            border-radius: 50%;
            background: var(--danger);
            border: 2px solid #fff;
        }

        /* ==================== 主内容区 ==================== */
        .main-content {
            max-width: var(--max-width);
            margin: 0 auto;
            padding: 20px 16px 40px;
            min-height: calc(100vh - var(--nav-height) - 40px);
        }
        .tab-panel { display: none; animation: fadeSlideIn 0.35s cubic-bezier(0.4, 0, 0.2, 1); }
        .tab-panel.active { display: block; }
        @keyframes fadeSlideIn {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ==================== 卡片 ==================== */
        .card {
            background: var(--surface);
            border-radius: var(--radius-xl);
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            overflow: hidden;
            transition: var(--transition);
            margin-bottom: 20px;
        }
        .card:hover { box-shadow: var(--shadow-md); }
        .card-header {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border-light);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            background: var(--surface-alt);
            flex-wrap: wrap;
        }
        .card-header h2 {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text);
            letter-spacing: -0.3px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .card-header h2 .dot { width: 9px; height: 9px; border-radius: 50%; display: inline-block; flex-shrink: 0; }
        .dot.indigo { background: var(--primary); }
        .dot.teal { background: var(--accent); }
        .dot.green { background: var(--success); }
        .dot.amber { background: var(--warning); }
        .card-body { padding: 16px 20px; }
        .card-body.no-padding { padding: 0; }
        .card-body.compact { padding: 12px 16px; }

        /* 基金信息栏 */
        .fund-info-bar {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
            background: #f8fafc;
            border: 1.5px solid var(--border);
            border-radius: var(--radius);
            padding: 12px 16px;
            margin-bottom: 16px;
        }
        .fund-info-bar .fi-label {
            font-size: 0.78rem;
            font-weight: 600;
            color: var(--text-secondary);
            letter-spacing: 0.3px;
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .fund-info-bar input {
            flex: 1;
            min-width: 100px;
            padding: 9px 12px;
            border: 1.8px solid var(--border);
            border-radius: 20px;
            font-size: 0.85rem;
            transition: var(--transition-fast);
            background: #fff;
            font-family: inherit;
            outline: none;
        }
        .fund-info-bar input:focus { border-color: #a5b4fc; box-shadow: 0 0 0 3px rgba(79,70,229,0.06); }

        /* 原有持仓 */
        .section-label {
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-secondary);
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .section-label .count-badge {
            font-size: 0.7rem;
            background: var(--primary-light);
            color: var(--primary);
            padding: 2px 10px;
            border-radius: 10px;
            font-weight: 600;
            text-transform: none;
        }
        .entry-row {
            display: flex;
            gap: 8px;
            align-items: center;
            margin-bottom: 6px;
            flex-wrap: wrap;
            background: #fafbfc;
            padding: 10px 14px;
            border-radius: var(--radius);
            border: 1.5px solid transparent;
            transition: var(--transition-fast);
        }
        .entry-row:hover { border-color: #e0e7ef; background: #f9fafb; }
        .entry-row .row-num {
            font-weight: 700;
            color: #cbd5e1;
            font-size: 0.8rem;
            min-width: 22px;
            text-align: center;
            flex-shrink: 0;
            font-family: var(--font-mono);
        }
        .entry-row input {
            flex: 1;
            min-width: 80px;
            padding: 9px 12px;
            border: 1.8px solid var(--border);
            border-radius: var(--radius-sm);
            font-size: 0.85rem;
            transition: var(--transition-fast);
            background: #fff;
            color: var(--text);
            font-family: var(--font-mono);
            outline: none;
        }
        .entry-row input:focus { border-color: #a5b4fc; box-shadow: 0 0 0 3px rgba(79,70,229,0.06); }
        .entry-row .shares-cell {
            flex: 0.9;
            min-width: 70px;
            text-align: right;
            font-family: var(--font-mono);
            font-weight: 600;
            color: var(--primary);
            font-size: 0.85rem;
            padding: 9px 10px;
            background: var(--primary-light);
            border-radius: var(--radius-sm);
            white-space: nowrap;
        }
        .entry-row .shares-cell.placeholder { color: #cbd5e1; background: #f8fafc; font-weight: 400; }
        .btn-remove {
            flex-shrink: 0;
            width: 28px; height: 28px;
            border-radius: 50%;
            border: 1.5px solid #fecaca;
            background: #fff;
            color: var(--danger);
            cursor: pointer;
            font-size: 0.85rem;
            transition: var(--transition-fast);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .btn-remove:hover { background: var(--danger-light); border-color: #f87171; }
        .btn-remove:disabled { opacity: 0.3; cursor: not-allowed; }
        .entry-row.highlight-new { background: #fffbeb; border-color: #fde68a; border-style: dashed; }

        /* 按钮 */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 9px 16px;
            border-radius: 22px;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            border: 1.8px solid transparent;
            transition: var(--transition-fast);
            letter-spacing: -0.2px;
            white-space: nowrap;
            font-family: inherit;
            user-select: none;
        }
        .btn:active { transform: scale(0.96); }
        .btn-primary { background: var(--primary); color: #fff; border-color: var(--primary); box-shadow: 0 2px 8px rgba(79,70,229,0.2); }
        .btn-primary:hover { background: var(--primary-hover); }
        .btn-outline { background: #fff; color: var(--primary); border-color: #c7d2fe; }
        .btn-outline:hover { background: var(--primary-light); }
        .btn-ghost { background: transparent; border-color: transparent; color: var(--text-secondary); }
        .btn-ghost:hover { background: #f1f5f9; }
        .btn-danger { background: #fff; color: var(--danger); border-color: #fecaca; }
        .btn-danger:hover { background: var(--danger-light); }
        .btn-sm { padding: 6px 12px; font-size: 0.78rem; border-radius: 18px; }
        .btn-xs { padding: 4px 10px; font-size: 0.72rem; border-radius: 14px; }
        .btn-accent { background: var(--accent); color: #fff; border-color: var(--accent); }

        /* 结果展示 */
        .result-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 10px;
            background: linear-gradient(135deg, #f8fafc 0%, #f0f9ff 30%, #ecfdf5 100%);
            border: 2px solid #dbeafe;
            border-radius: var(--radius-lg);
            padding: 16px 18px;
            margin-top: 14px;
        }
        .result-item { text-align: center; }
        .result-item .r-label { font-size: 0.68rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.4px; }
        .result-item .r-value { font-size: 1.2rem; font-weight: 700; color: var(--text); font-family: var(--font-mono); }
        .result-item .r-value.large { font-size: 1.5rem; color: var(--primary); }
        .result-item .r-value.green { color: var(--success); }
        .result-item.full-width {
            grid-column: 1 / -1;
            background: #fff;
            border-radius: var(--radius-sm);
            padding: 12px;
            border: 2px dashed #c7d2fe;
        }
        .result-item.full-width .r-value { font-size: 1.8rem; }

        .save-bar { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; margin-top: 14px; padding-top: 14px; border-top: 1px dashed var(--border); justify-content: flex-end; }

        /* 记录列表 */
        .records-toolbar {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
            padding: 10px 16px;
            border-bottom: 1px solid var(--border-light);
            background: #fafbfc;
        }
        .search-input-wrap { flex: 1; min-width: 150px; position: relative; }
        .search-input-wrap input {
            width: 100%;
            padding: 9px 12px 9px 34px;
            border: 1.8px solid var(--border);
            border-radius: 20px;
            font-size: 0.82rem;
            background: #fff;
        }
        .search-input-wrap .search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: #94a3b8; }
        .records-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 12px;
            padding: 14px 16px;
            max-height: 60vh;
            overflow-y: auto;
        }
        .record-card-item {
            background: #fff;
            border: 1.5px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 14px 16px;
            transition: var(--transition-fast);
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .record-card-item:hover { border-color: #c7d2fe; box-shadow: var(--shadow-md); }
        .record-card-item.editing-highlight { border-color: var(--primary); background: var(--primary-light); }
        .record-card-item .rc-title { font-weight: 600; font-size: 0.9rem; }
        .record-card-item .rc-code { font-size: 0.68rem; color: var(--text-muted); }
        .record-card-item .rc-meta { font-size: 0.72rem; color: var(--text-secondary); }
        .record-card-item .rc-actions { display: flex; gap: 6px; margin-top: 4px; }

        /* 概览 */
        .stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; margin-bottom: 16px; }
        .stat-card { background: #fff; border: 1.5px solid var(--border); border-radius: var(--radius-lg); padding: 16px; text-align: center; }
        .stat-card .stat-value { font-size: 1.6rem; font-weight: 700; font-family: var(--font-mono); }
        .bar-chart { display: flex; align-items: flex-end; gap: 10px; height: 160px; }

        /* 工具 */
        .tool-section { padding: 14px 0; border-bottom: 1px solid var(--border-light); }
        .tool-section:last-child { border-bottom: none; }

        /* Toast */
        .toast-container { position: fixed; top: 16px; right: 16px; z-index: 9999; }
        .toast { padding: 12px 18px; border-radius: 24px; font-size: 0.82rem; color: #fff; box-shadow: var(--shadow-xl); animation: slideIn 0.3s ease-out; }
        @keyframes slideIn { from { transform: translateX(130%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

        /* ==================== 响应式优化（针对6.5英寸手机 ~ 414px） ==================== */
        @media (max-width: 480px) {
            :root { --nav-height: 56px; }
            .navbar-inner { padding: 0 8px; gap: 6px; }
            .nav-brand { gap: 4px; font-size: 0.9rem; }
            .nav-brand .brand-icon { width: 32px; height: 32px; font-size: 1rem; border-radius: 8px; }
            .nav-tabs { gap: 2px; padding: 3px; border-radius: 22px; }
            .nav-tab { padding: 6px 10px; font-size: 0.72rem; border-radius: 18px; gap: 3px; }
            .nav-tab .tab-icon { font-size: 0.85rem; }
            .btn-icon { width: 32px; height: 32px; font-size: 0.9rem; }

            .main-content { padding: 12px 8px 30px; }
            .card-header { padding: 12px 14px; }
            .card-body { padding: 12px 14px; }
            .fund-info-bar { flex-direction: column; align-items: stretch; gap: 8px; }
            .fund-info-bar input { width: 100%; }

            .entry-row { flex-direction: column; gap: 6px; padding: 8px 10px; }
            .entry-row input, .entry-row .shares-cell { width: 100%; min-width: auto; }
            .entry-row .shares-cell { text-align: right; }
            .btn-remove { align-self: flex-end; }

            .result-grid { grid-template-columns: 1fr 1fr; gap: 6px; padding: 10px 12px; }
            .result-item .r-value { font-size: 1rem; }
            .result-item .r-value.large { font-size: 1.3rem; }
            .result-item.full-width .r-value { font-size: 1.5rem; }

            .save-bar { justify-content: center; }
            .records-grid { grid-template-columns: 1fr; max-height: 55vh; }
            .stats-row { grid-template-columns: 1fr 1fr; }
        }
        @media (max-width: 380px) {
            .nav-brand span { display: none; }  /* 只保留图标 */
            .nav-tab { padding: 5px 8px; font-size: 0.68rem; }
        }
    </style>
</head>
<body>

    <!-- ==================== 导航栏 ==================== -->
    <nav class="navbar" id="navbar">
        <div class="navbar-inner">
            <div class="nav-brand">
                <div class="brand-icon">📊</div>
                <span>基金持仓成本计算器</span>
            </div>
            <div class="nav-tabs" id="navTabs">
                <button class="nav-tab active" data-tab="calculator" onclick="switchTab('calculator')">
                    <span class="tab-icon">🧮</span> <span class="tab-text">计算器</span>
                </button>
                <button class="nav-tab" data-tab="records" onclick="switchTab('records')">
                    <span class="tab-icon">📋</span> <span class="tab-text">记录</span>
                </button>
                <button class="nav-tab" data-tab="overview" onclick="switchTab('overview')">
                    <span class="tab-icon">📈</span> <span class="tab-text">概览</span>
                </button>
                <button class="nav-tab" data-tab="tools" onclick="switchTab('tools')">
                    <span class="tab-icon">⚙️</span> <span class="tab-text">工具</span>
                </button>
            </div>
            <div class="nav-actions">
                <button class="btn-icon" onclick="switchTab('records')" title="查看记录">
                    📁
                    <span class="badge-dot" id="recordBadgeDot" style="display:none;"></span>
                </button>
            </div>
        </div>
    </nav>

    <!-- Toast -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- 主内容区 -->
    <div class="main-content" id="mainContent">

        <!-- Tab 1: 计算器 -->
        <div class="tab-panel active" id="panel-calculator">
            <div class="card">
                <div class="card-header">
                    <h2><span class="dot indigo"></span>持仓成本计算</h2>
                    <button class="btn btn-ghost btn-sm" onclick="resetCalculator()">🔄 清空</button>
                </div>
                <div class="card-body">
                    <div class="fund-info-bar">
                        <span class="fi-label">🏷️ 代码</span>
                        <input type="text" id="fundCode" placeholder="例如：000001" maxlength="20" style="max-width:160px;">
                        <span class="fi-label">📛 名称</span>
                        <input type="text" id="fundName" placeholder="例如：华夏成长混合" maxlength="50" style="flex:2;">
                    </div>

                    <div class="section-label">📋 原有持仓 <span class="count-badge" id="entryCount">2笔</span></div>
                    <div id="originalEntriesContainer"></div>
                    <button class="btn btn-outline btn-sm" onclick="addEntryRow()" style="margin-bottom:10px;">➕ 添加一笔</button>

                    <div class="section-label">🎯 预期购入</div>
                    <div class="entry-row highlight-new">
                        <span class="row-num">🆕</span>
                        <input type="number" id="newAmount" class="input-amount" placeholder="金额（元）" step="0.01" oninput="autoCalc()">
                        <input type="number" id="newPrice" class="input-price" placeholder="单价（元）" step="0.0001" oninput="autoCalc()">
                        <span class="shares-cell placeholder" id="newShares">— 份</span>
                    </div>

                    <div class="result-grid">
                        <div class="result-item"><div class="r-label">原有总金额</div><div class="r-value" id="totalOrigAmount">¥0.00</div></div>
                        <div class="result-item"><div class="r-label">原有总份额</div><div class="r-value" id="totalOrigShares">0.0000</div></div>
                        <div class="result-item"><div class="r-label">含预期总金额</div><div class="r-value green" id="grandTotalAmount">¥0.00</div></div>
                        <div class="result-item"><div class="r-label">含预期总份额</div><div class="r-value green" id="grandTotalShares">0.0000</div></div>
                        <div class="result-item full-width">
                            <div class="r-label">⭐ 最终持仓单价</div>
                            <div class="r-value large" id="finalPrice">—</div>
                        </div>
                    </div>

                    <div class="save-bar">
                        <button class="btn btn-primary" id="btnSave" onclick="saveRecord()">💾 保存记录</button>
                        <button class="btn btn-ghost btn-sm" id="btnCancelEdit" onclick="cancelEdit()" style="display:none;">✕ 取消编辑</button>
                        <input type="hidden" id="editingId" value="">
                    </div>
                </div>
            </div>
        </div>

        <!-- Tab 2: 记录 -->
        <div class="tab-panel" id="panel-records">
            <div class="card">
                <div class="card-header">
                    <h2><span class="dot teal"></span>已保存的记录</h2>
                    <div style="display:flex;gap:6px;">
                        <button class="btn btn-outline btn-sm" onclick="exportAllRecords()">📥 导出</button>
                        <button class="btn btn-ghost btn-sm" onclick="refreshRecords()">🔄 刷新</button>
                    </div>
                </div>
                <div class="records-toolbar">
                    <div class="search-input-wrap">
                        <span class="search-icon">🔍</span>
                        <input type="text" id="searchInput" placeholder="搜索代码或名称..." oninput="renderRecordsList()">
                    </div>
                    <span id="recordCountLabel" style="font-size:0.75rem;color:var(--text-muted);">共 0 条</span>
                </div>
                <div class="records-grid" id="recordsGrid">
                    <div class="empty-state" style="grid-column:1/-1;text-align:center;padding:40px;color:var(--text-muted);">
                        <div style="font-size:3rem;">📭</div>
                        <p>暂无记录</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Tab 3: 概览 -->
        <div class="tab-panel" id="panel-overview">
            <div class="stats-row">
                <div class="stat-card primary-border"><div class="stat-icon">📁</div><div class="stat-value" id="statTotalRecords">0</div><div class="stat-label">总记录</div></div>
                <div class="stat-card accent"><div class="stat-icon">💰</div><div class="stat-value" id="statTotalAmount">¥0</div><div class="stat-label">总金额</div></div>
                <div class="stat-card success-border"><div class="stat-icon">⭐</div><div class="stat-value" id="statAvgPrice">—</div><div class="stat-label">平均单价</div></div>
                <div class="stat-card warning-border"><div class="stat-icon">🏷️</div><div class="stat-value" id="statUniqueFunds">0</div><div class="stat-label">基金数</div></div>
            </div>
            <div class="card">
                <div class="card-header"><h2><span class="dot indigo"></span>最近持仓单价</h2></div>
                <div class="card-body compact"><div class="bar-chart" id="barChartContainer"></div></div>
            </div>
        </div>

        <!-- Tab 4: 工具 -->
        <div class="tab-panel" id="panel-tools">
            <div class="card">
                <div class="card-header"><h2><span class="dot amber"></span>数据工具</h2></div>
                <div class="card-body">
                    <div class="tool-section">
                        <h3>📥 导出备份</h3>
                        <p style="font-size:0.8rem;color:var(--text-secondary);">导出所有记录为JSON文件。</p>
                        <button class="btn btn-outline btn-sm" onclick="exportAllRecords()">📥 导出JSON</button>
                    </div>
                    <div class="tool-section">
                        <h3>📤 导入恢复</h3>
                        <p style="font-size:0.8rem;color:var(--text-secondary);">拖拽.json文件到下方区域或点击选择。</p>
                        <div id="dropZone" style="border:2px dashed #cbd5e1;border-radius:16px;padding:24px;text-align:center;background:#fafbfc;"
                             ondrop="handleDrop(event)" ondragover="handleDragOver(event)" ondragleave="handleDragLeave(event)"
                             onclick="document.getElementById('fileInput').click()">
                            <span style="font-size:2rem;">📂</span>
                            <p>拖拽文件到这里</p>
                        </div>
                        <input type="file" id="fileInput" accept=".json" style="display:none;" onchange="handleFileSelect(event)">
                    </div>
                    <div class="tool-section">
                        <h3>🗑️ 清空数据</h3>
                        <p style="font-size:0.8rem;color:var(--danger);">删除全部本地记录，不可恢复。</p>
                        <button class="btn btn-danger btn-sm" onclick="clearAllData()">🗑️ 清空全部</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        (function() {
            const STORAGE_KEY = 'fund_calc_records_v5';
            function getDB() { try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; } catch(e) { return []; } }
            function saveDB(records) { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(records)); } catch(e) { if(e.name==='QuotaExceededError') showToast('存储空间不足','error'); } }
            function genId() { return Date.now().toString(36)+'-'+Math.random().toString(36).substr(2,9); }
            function dbFindAll() { return getDB().sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt)); }
            function dbFindById(id) { return getDB().find(r=>r.id===id); }
            function dbInsert(record) { const records=getDB(); record.id=genId(); record.createdAt=new Date().toISOString(); record.updatedAt=record.createdAt; records.unshift(record); saveDB(records); return record; }
            function dbUpdate(id,data) { const records=getDB(); const idx=records.findIndex(r=>r.id===id); if(idx===-1) return null; records[idx]={...records[idx],...data,id:records[idx].id,createdAt:records[idx].createdAt,updatedAt:new Date().toISOString()}; saveDB(records); return records[idx]; }
            function dbDelete(id) { const records=getDB(); const filtered=records.filter(r=>r.id!==id); saveDB(filtered); return filtered.length<records.length; }
            function dbSearch(kw) { if(!kw) return dbFindAll(); const k=kw.toLowerCase(); return getDB().filter(r=>(r.code&&r.code.toLowerCase().includes(k))||(r.name&&r.name.toLowerCase().includes(k))).sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt)); }
            function dbExport() { return JSON.stringify(getDB(),null,2); }
            function dbImport(jsonStr) { const data=JSON.parse(jsonStr); if(!Array.isArray(data)) throw new Error('格式错误'); const existing=getDB(); const ids=new Set(existing.map(r=>r.id)); let cnt=0; data.forEach(item=>{ if(!item.id||!ids.has(item.id)) { if(!item.id) item.id=genId(); if(!item.createdAt) item.createdAt=new Date().toISOString(); if(!item.updatedAt) item.updatedAt=item.createdAt; existing.unshift(item); ids.add(item.id); cnt++; } }); saveDB(existing); return cnt; }

            function showToast(msg,type='info') { const container=document.getElementById('toastContainer'); if(!container) return; const toast=document.createElement('div'); toast.className=`toast ${type}`; toast.textContent=msg; container.appendChild(toast); setTimeout(()=>toast.remove(),2500); }

            let currentTab='calculator';
            function switchTab(tab) {
                currentTab=tab;
                document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));
                document.querySelector(`.nav-tab[data-tab="${tab}"]`).classList.add('active');
                document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
                document.getElementById(`panel-${tab}`).classList.add('active');
                if(tab==='overview') refreshOverview();
                if(tab==='records') renderRecordsList();
                sessionStorage.setItem('fund_calc_tab',tab);
            }

            let entryRowCount=2;
            const MAX_ROWS=20;
            function createEntryRow(idx) {
                const row=document.createElement('div'); row.className='entry-row'; row.setAttribute('data-index',idx);
                row.innerHTML=`<span class="row-num">${idx+1}</span>
                    <input type="number" class="input-amount" placeholder="金额" step="0.01" oninput="autoCalc()" data-type="amount" data-index="${idx}">
                    <input type="number" class="input-price" placeholder="单价" step="0.0001" oninput="autoCalc()" data-type="price" data-index="${idx}">
                    <span class="shares-cell placeholder" data-type="shares" data-index="${idx}">— 份</span>
                    <button class="btn-remove" onclick="removeEntryRow(this,${idx})" ${entryRowCount<=1?'disabled':''}>✕</button>`;
                return row;
            }
            function renderEntryRows(count) { const c=document.getElementById('originalEntriesContainer'); c.innerHTML=''; for(let i=0;i<count;i++) c.appendChild(createEntryRow(i)); entryRowCount=count; updateBadge(); }
            function addEntryRow() { if(entryRowCount>=MAX_ROWS) { showToast('最多20笔','warning'); return; } const c=document.getElementById('originalEntriesContainer'); c.appendChild(createEntryRow(entryRowCount)); entryRowCount++; updateBadge(); }
            function removeEntryRow(btn,idx) { if(entryRowCount<=1) { showToast('至少一笔','warning'); return; } const row=btn.closest('.entry-row'); row.style.opacity='0'; row.style.transform='translateX(-20px)'; setTimeout(()=>{ row.remove(); entryRowCount--; reindexRows(); updateBadge(); autoCalc(); },200); }
            function reindexRows() { const rows=document.querySelectorAll('#originalEntriesContainer .entry-row'); rows.forEach((row,i)=>{ row.setAttribute('data-index',i); row.querySelector('.row-num').textContent=i+1; row.querySelectorAll('input').forEach(inp=>inp.setAttribute('data-index',i)); row.querySelector('.shares-cell').setAttribute('data-index',i); row.querySelector('.btn-remove').setAttribute('onclick',`removeEntryRow(this,${i})`); }); entryRowCount=rows.length; }
            function updateBadge() { document.getElementById('entryCount').textContent=entryRowCount+'笔'; document.querySelectorAll('.btn-remove').forEach(b=>b.disabled=entryRowCount<=1); }

            function getOriginalEntries() {
                const rows=document.querySelectorAll('#originalEntriesContainer .entry-row');
                const entries=[];
                rows.forEach(row=>{
                    const amt=parseFloat(row.querySelector('.input-amount').value)||0;
                    const prc=parseFloat(row.querySelector('.input-price').value)||0;
                    if(amt>0||prc>0) entries.push({amount:amt,price:prc,shares:prc>0?amt/prc:0});
                });
                return entries;
            }

            function autoCalc() {
                const entries=getOriginalEntries();
                let totalAmt=0,totalShr=0;
                entries.forEach(e=>{ if(e.amount>0&&e.price>0){ totalAmt+=e.amount; totalShr+=e.shares; } });
                document.querySelectorAll('#originalEntriesContainer .entry-row').forEach(row=>{
                    const amt=parseFloat(row.querySelector('.input-amount').value)||0;
                    const prc=parseFloat(row.querySelector('.input-price').value)||0;
                    const cell=row.querySelector('.shares-cell');
                    if(amt>0&&prc>0){ cell.textContent=(amt/prc).toFixed(4)+' 份'; cell.classList.remove('placeholder'); }
                    else { cell.textContent='— 份'; cell.classList.add('placeholder'); }
                });
                const newAmt=parseFloat(document.getElementById('newAmount').value)||0;
                const newPrc=parseFloat(document.getElementById('newPrice').value)||0;
                const newShr=(newPrc>0&&newAmt>0)?newAmt/newPrc:0;
                const newCell=document.getElementById('newShares');
                if(newAmt>0&&newPrc>0){ newCell.textContent=newShr.toFixed(4)+' 份'; newCell.classList.remove('placeholder'); }
                else { newCell.textContent='— 份'; newCell.classList.add('placeholder'); }
                const grandAmt=totalAmt+newAmt, grandShr=totalShr+newShr;
                const finalPrc=grandShr>0?grandAmt/grandShr:0;
                document.getElementById('totalOrigAmount').textContent='¥'+totalAmt.toFixed(2);
                document.getElementById('totalOrigShares').textContent=totalShr.toFixed(4)+' 份';
                document.getElementById('grandTotalAmount').textContent='¥'+grandAmt.toFixed(2);
                document.getElementById('grandTotalShares').textContent=grandShr.toFixed(4)+' 份';
                const fp=document.getElementById('finalPrice');
                if(grandShr>0) fp.textContent='¥'+finalPrc.toFixed(4);
                else fp.textContent='—';
            }

            function getCalculatorData() {
                const entries=getOriginalEntries().filter(e=>e.amount>0&&e.price>0);
                const newAmt=parseFloat(document.getElementById('newAmount').value)||0;
                const newPrc=parseFloat(document.getElementById('newPrice').value)||0;
                const newShr=(newPrc>0&&newAmt>0)?newAmt/newPrc:0;
                let totalAmt=0,totalShr=0; entries.forEach(e=>{ totalAmt+=e.amount; totalShr+=e.shares; });
                const grandAmt=totalAmt+newAmt, grandShr=totalShr+newShr;
                return {
                    originalEntries:entries,
                    newEntry:{amount:newAmt,price:newPrc,shares:newShr},
                    totalAmount:grandAmt, totalShares:grandShr, finalPrice:grandShr>0?grandAmt/grandShr:0
                };
            }

            function resetCalculator() {
                document.getElementById('fundCode').value='';
                document.getElementById('fundName').value='';
                document.getElementById('newAmount').value='';
                document.getElementById('newPrice').value='';
                document.getElementById('editingId').value='';
                document.getElementById('btnSave').textContent='💾 保存记录';
                document.getElementById('btnSave').className='btn btn-primary';
                document.getElementById('btnCancelEdit').style.display='none';
                renderEntryRows(2);
                autoCalc();
                document.querySelectorAll('.record-card-item.editing-highlight').forEach(c=>c.classList.remove('editing-highlight'));
            }
            function cancelEdit() { resetCalculator(); showToast('已取消编辑','info'); }

            function saveRecord() {
                const data=getCalculatorData();
                if(data.originalEntries.length===0 && (data.newEntry.amount<=0||data.newEntry.price<=0)) { showToast('请至少输入一笔有效数据','error'); return; }
                const code=document.getElementById('fundCode').value.trim();
                const name=document.getElementById('fundName').value.trim();
                const editingId=document.getElementById('editingId').value;
                const record={code,name,...data};
                if(editingId) {
                    if(dbUpdate(editingId,record)) { showToast('✅ 记录已更新','success'); resetCalculator(); refreshAll(); }
                    else showToast('更新失败','error');
                } else {
                    dbInsert(record);
                    showToast('✅ 记录已保存','success');
                    document.getElementById('fundCode').value='';
                    document.getElementById('fundName').value='';
                    refreshAll();
                }
                updateBadgeDot();
            }

            function editRecord(id) {
                const record=dbFindById(id); if(!record) return;
                document.getElementById('editingId').value=id;
                document.getElementById('btnSave').textContent='✏️ 更新记录';
                document.getElementById('btnSave').className='btn btn-accent';
                document.getElementById('btnCancelEdit').style.display='inline-flex';
                const container=document.getElementById('originalEntriesContainer');
                container.innerHTML='';
                const orig=record.originalEntries||[];
                entryRowCount=Math.max(orig.length,1);
                for(let i=0;i<entryRowCount;i++) {
                    const row=createEntryRow(i); container.appendChild(row);
                    if(orig[i]) { row.querySelector('.input-amount').value=orig[i].amount; row.querySelector('.input-price').value=orig[i].price; }
                }
                document.getElementById('newAmount').value=record.newEntry.amount||'';
                document.getElementById('newPrice').value=record.newEntry.price||'';
                document.getElementById('fundCode').value=record.code||'';
                document.getElementById('fundName').value=record.name||'';
                updateBadge(); autoCalc(); switchTab('calculator');
            }

            function deleteRecord(id) {
                if(confirm('确定删除该记录吗？')) {
                    if(dbDelete(id)) { if(document.getElementById('editingId').value===id) resetCalculator(); showToast('已删除','info'); refreshAll(); }
                }
            }

            function renderRecordsList() {
                const kw=document.getElementById('searchInput').value;
                const records=dbSearch(kw);
                document.getElementById('recordCountLabel').textContent=`共 ${records.length} 条`;
                const grid=document.getElementById('recordsGrid');
                if(records.length===0) {
                    grid.innerHTML='<div class="empty-state" style="grid-column:1/-1;text-align:center;padding:40px;color:var(--text-muted);"><div style="font-size:3rem;">📭</div><p>暂无记录</p></div>';
                    return;
                }
                grid.innerHTML=records.map(r=>{
                    const title=r.name||r.code||'未命名';
                    const code=r.code&&r.name?r.code:'';
                    return `<div class="record-card-item" data-id="${r.id}">
                        <div><strong>${escHtml(title)}</strong> ${code?`<span class="rc-code">${escHtml(code)}</span>`:''}</div>
                        <div class="rc-meta">💰 ¥${r.totalAmount.toFixed(2)} ⭐ ¥${r.finalPrice.toFixed(4)}</div>
                        <div class="rc-actions">
                            <button class="btn btn-outline btn-xs" onclick="editRecord('${r.id}')">编辑</button>
                            <button class="btn btn-danger btn-xs" onclick="deleteRecord('${r.id}')">删除</button>
                        </div>
                    </div>`;
                }).join('');
            }

            function refreshOverview() {
                const records=getDB();
                document.getElementById('statTotalRecords').textContent=records.length;
                const totalAmt=records.reduce((s,r)=>s+(r.totalAmount||0),0);
                document.getElementById('statTotalAmount').textContent='¥'+totalAmt.toFixed(0);
                const prices=records.map(r=>r.finalPrice).filter(p=>p>0);
                const avg=prices.length>0?prices.reduce((a,b)=>a+b,0)/prices.length:0;
                document.getElementById('statAvgPrice').textContent=prices.length>0?'¥'+avg.toFixed(4):'—';
                document.getElementById('statUniqueFunds').textContent=new Set(records.map(r=>r.code).filter(Boolean)).size;
                const chart=document.getElementById('barChartContainer');
                const recent=records.slice(0,8).reverse();
                if(recent.length===0) { chart.innerHTML='<p style="color:#cbd5e1;text-align:center;">暂无数据</p>'; return; }
                const maxP=Math.max(...recent.map(r=>r.finalPrice||0),0.01);
                chart.innerHTML=recent.map((r,i)=>{
                    const h=Math.max((r.finalPrice/maxP)*140,8);
                    const label=(r.name||r.code||'?').slice(0,5);
                    return `<div class="bar-col"><div class="bar-value">¥${r.finalPrice.toFixed(2)}</div><div class="bar${i%2?' accent-bar':''}" style="height:${h}px;" title="${escHtml(r.name||'')}"></div><div style="font-size:0.6rem;">${escHtml(label)}</div></div>`;
                }).join('');
            }

            function escHtml(s) { const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }
            function refreshAll() { renderRecordsList(); if(currentTab==='overview') refreshOverview(); updateBadgeDot(); }
            function refreshRecords() { renderRecordsList(); }
            function updateBadgeDot() { const dot=document.getElementById('recordBadgeDot'); dot.style.display=getDB().length>0?'block':'none'; }

            function exportAllRecords() { const records=getDB(); if(records.length===0) { showToast('无记录可导出','warning'); return; } const blob=new Blob([dbExport()],{type:'application/json'}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=`基金备份_${new Date().toISOString().slice(0,10)}.json`; a.click(); showToast('导出成功','success'); }
            function handleDragOver(e) { e.preventDefault(); e.currentTarget.style.borderColor='#4f46e5'; }
            function handleDragLeave(e) { e.currentTarget.style.borderColor='#cbd5e1'; }
            function handleDrop(e) { e.preventDefault(); e.currentTarget.style.borderColor='#cbd5e1'; if(e.dataTransfer.files.length>0) processImportFile(e.dataTransfer.files[0]); }
            function handleFileSelect(e) { if(e.target.files.length>0) processImportFile(e.target.files[0]); e.target.value=''; }
            function processImportFile(file) { if(!file.name.endsWith('.json')) { showToast('请选择.json文件','error'); return; } const reader=new FileReader(); reader.onload=ev=>{ try { const cnt=dbImport(ev.target.result); showToast(`成功导入 ${cnt} 条`,'success'); refreshAll(); } catch(err) { showToast('导入失败：'+err.message,'error'); } }; reader.readAsText(file); }
            function clearAllData() { if(confirm('确认清空全部记录？')) { saveDB([]); resetCalculator(); refreshAll(); showToast('已清空','warning'); } }

            window.switchTab=switchTab;
            window.addEntryRow=addEntryRow;
            window.removeEntryRow=removeEntryRow;
            window.autoCalc=autoCalc;
            window.saveRecord=saveRecord;
            window.editRecord=editRecord;
            window.deleteRecord=deleteRecord;
            window.resetCalculator=resetCalculator;
            window.cancelEdit=cancelEdit;
            window.renderRecordsList=renderRecordsList;
            window.refreshRecords=refreshRecords;
            window.exportAllRecords=exportAllRecords;
            window.handleDrop=handleDrop;
            window.handleDragOver=handleDragOver;
            window.handleDragLeave=handleDragLeave;
            window.handleFileSelect=handleFileSelect;
            window.clearAllData=clearAllData;

            renderEntryRows(2);
            autoCalc();
            renderRecordsList();
            updateBadgeDot();
            try { const tab=sessionStorage.getItem('fund_calc_tab'); if(tab) switchTab(tab); } catch(e) {}
            document.addEventListener('keydown',e=>{
                if((e.ctrlKey||e.metaKey)&&e.key==='s') { e.preventDefault(); saveRecord(); }
                if((e.ctrlKey||e.metaKey)&&e.key==='n') { e.preventDefault(); resetCalculator(); switchTab('calculator'); }
            });
            console.log('📱 已针对6.5英寸手机优化导航栏');
        })();
    </script>
</body>
</html>
