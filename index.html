<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>数据看板 · 移动端</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js">
    </script>
    <style>
        /* ===== 全局重置 & 变量 ===== */
        :root {
            --primary: #1677ff;
            --primary-light: #e6f0ff;
            --primary-active: #0958d9;
            --bg: #f2f5fa;
            --card-bg: #ffffff;
            --text-dark: #1a2332;
            --text-mid: #3a4a5e;
            --text-light: #7a8a9e;
            --border-color: #e9edf4;
            --radius: 20px;
            --shadow-sm: 0 2px 12px rgba(0, 20, 50, 0.06);
            --shadow-md: 0 4px 20px rgba(0, 20, 50, 0.08);
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }
        body {
            background: var(--bg);
            display: flex;
            justify-content: center;
            min-height: 100vh;
            padding: 12px 0 30px 0;
        }
        .app-container {
            width: 100%;
            max-width: 420px;
            background: var(--bg);
            padding: 16px 16px 80px 16px;
            margin: 0 12px;
        }
        /* ===== 头部 ===== */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }
        .header h1 {
            font-size: 20px;
            font-weight: 700;
            color: var(--text-dark);
            letter-spacing: -0.3px;
        }
        .filter-trigger {
            background: white;
            padding: 8px 14px;
            border-radius: 30px;
            font-size: 13px;
            color: var(--primary);
            font-weight: 500;
            border: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 4px;
            cursor: pointer;
            background: #ffffff;
            box-shadow: var(--shadow-sm);
            transition: all 0.2s;
        }
        .filter-trigger:active {
            transform: scale(0.95);
            background: var(--primary-light);
        }
        /* ===== 浮层 ===== */
        .filter-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.45);
            z-index: 999;
            justify-content: center;
            align-items: flex-end;
        }
        .filter-overlay.active {
            display: flex;
        }
        .filter-panel {
            background: white;
            width: 100%;
            max-width: 420px;
            max-height: 80vh;
            border-radius: 24px 24px 0 0;
            padding: 24px 20px 40px 20px;
            overflow-y: auto;
            animation: slideUp 0.3s ease;
            box-shadow: 0 -8px 30px rgba(0,0,0,0.08);
        }
        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }
        .filter-panel .title {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 20px;
            color: var(--text-dark);
        }
        .filter-panel .close-btn {
            font-size: 24px;
            color: #8c9ab0;
            cursor: pointer;
        }
        .filter-group {
            margin-bottom: 22px;
        }
        .filter-group label {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-mid);
            display: block;
            margin-bottom: 8px;
        }
        .filter-options {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        .filter-options .tag {
            background: #f0f2f7;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 13px;
            color: var(--text-mid);
            border: 1px solid transparent;
            cursor: pointer;
            user-select: none;
            transition: all 0.15s;
        }
        .filter-options .tag.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
            box-shadow: 0 2px 8px rgba(22, 119, 255, 0.2);
        }
        .filter-options .tag:active {
            transform: scale(0.94);
        }
        .date-range {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .date-range input {
            flex: 1;
            padding: 10px 12px;
            border: 1px solid #dce0e8;
            border-radius: 12px;
            font-size: 14px;
            background: #fafbfc;
        }
        .apply-filter-btn {
            width: 100%;
            background: var(--primary);
            color: white;
            border: none;
            padding: 14px 0;
            border-radius: 16px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
            box-shadow: 0 4px 12px rgba(22, 119, 255, 0.25);
            transition: all 0.2s;
        }
        .apply-filter-btn:active {
            background: var(--primary-active);
            transform: scale(0.98);
        }
        /* ===== 指标筛选浮层 ===== */
        .indicator-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            max-height: 50vh;
            overflow-y: auto;
            margin: 12px 0 16px 0;
        }
        .indicator-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 12px;
            background: #f8faff;
            border-radius: 12px;
            border: 1px solid #eef2f7;
        }
        .indicator-item input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: var(--primary);
            flex-shrink: 0;
        }
        .indicator-item label {
            font-size: 14px;
            color: var(--text-dark);
            flex: 1;
        }
        .indicator-actions {
            display: flex;
            gap: 12px;
            margin-top: 8px;
        }
        .indicator-actions button {
            flex: 1;
            padding: 12px 0;
            border-radius: 16px;
            font-size: 15px;
            font-weight: 600;
            border: none;
            cursor: pointer;
            transition: all 0.15s;
        }
        .indicator-actions .btn-apply {
            background: var(--primary);
            color: white;
            box-shadow: 0 2px 8px rgba(22, 119, 255, 0.2);
        }
        .indicator-actions .btn-apply:active {
            background: var(--primary-active);
            transform: scale(0.96);
        }
        .indicator-actions .btn-cancel {
            background: #f0f2f7;
            color: var(--text-mid);
        }
        .indicator-actions .btn-cancel:active {
            background: #e0e4ec;
            transform: scale(0.96);
        }
        /* ===== 客户明细弹窗 ===== */
        .detail-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            justify-content: center;
            align-items: flex-end;
        }
        .detail-overlay.active {
            display: flex;
        }
        .detail-panel {
            background: white;
            width: 100%;
            max-width: 420px;
            max-height: 85vh;
            border-radius: 24px 24px 0 0;
            padding: 20px 16px 30px 16px;
            overflow-y: auto;
            animation: slideUp 0.3s ease;
            box-shadow: 0 -8px 30px rgba(0,0,0,0.08);
        }
        .detail-panel .title {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 17px;
            font-weight: 600;
            color: var(--text-dark);
            margin-bottom: 12px;
            position: sticky;
            top: 0;
            background: white;
            z-index: 2;
            padding-bottom: 8px;
            border-bottom: 1px solid #eef0f4;
        }
        .detail-panel .close-btn {
            font-size: 24px;
            color: #8c9ab0;
            cursor: pointer;
            padding: 0 8px;
        }
        .detail-panel .client-row {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 4px 8px;
            padding: 8px 0;
            border-bottom: 1px solid #f2f4f8;
            font-size: 12px;
            align-items: center;
        }
        .detail-panel .client-row.header-row {
            font-weight: 600;
            color: var(--text-dark);
            background: #f8faff;
            border-radius: 8px;
            padding: 8px 6px;
            margin-bottom: 4px;
            border-bottom: 2px solid #dce0e8;
            position: sticky;
            top: 48px;
            background: white;
            z-index: 1;
        }
        .detail-panel .client-row .cell {
            padding: 2px 4px;
            word-break: break-all;
            line-height: 1.4;
        }
        .detail-panel .client-row .cell .tag {
            background: #eef5ff;
            color: var(--primary);
            padding: 0 6px;
            border-radius: 10px;
            font-size: 10px;
            white-space: nowrap;
        }
        .detail-panel .client-row .cell .status {
            font-size: 10px;
            padding: 1px 8px;
            border-radius: 12px;
            display: inline-block;
        }
        .detail-panel .client-row .cell .status.active {
            background: #e5f9ed;
            color: #22a65e;
        }
        .detail-panel .client-row .cell .status.inactive {
            background: #fde8e8;
            color: #e65a5a;
        }
        .detail-panel .export-btn {
            margin-top: 16px;
            width: 100%;
            padding: 12px 0;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 16px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            position: sticky;
            bottom: 0;
            box-shadow: 0 2px 12px rgba(22, 119, 255, 0.25);
            transition: all 0.15s;
        }
        .detail-panel .export-btn:active {
            background: var(--primary-active);
            transform: scale(0.98);
        }
        /* ===== 板块通用 ===== */
        .block-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 12px 0 4px 0;
        }
        .block-header h2 {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-dark);
        }
        .indicator-filter-btn {
            background: white;
            padding: 4px 14px;
            border-radius: 30px;
            font-size: 12px;
            color: var(--primary);
            border: 1px solid #dce0e8;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 4px;
            box-shadow: var(--shadow-sm);
            transition: all 0.15s;
        }
        .indicator-filter-btn:active {
            transform: scale(0.94);
            background: var(--primary-light);
        }
        /* ===== 页面容器 ===== */
        .page-container {
            display: none;
        }
        .page-container.active {
            display: block;
        }
        /* ===== 总览 ===== */
        .metrics-scroll {
            display: flex;
            gap: 12px;
            overflow-x: auto;
            padding: 4px 0 16px 0;
            scrollbar-width: none;
            -webkit-overflow-scrolling: touch;
        }
        .metrics-scroll::-webkit-scrollbar {
            display: none;
        }
        .metric-card {
            flex: 0 0 140px;
            background: white;
            border-radius: var(--radius);
            padding: 16px 14px;
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow-sm);
            cursor: pointer;
            transition: all 0.15s;
        }
        .metric-card:active {
            transform: scale(0.96);
            box-shadow: var(--shadow-md);
        }
        .metric-card .label {
            font-size: 13px;
            color: var(--text-light);
            margin-bottom: 4px;
            font-weight: 500;
        }
        .metric-card .value {
            font-size: 26px;
            font-weight: 700;
            color: var(--text-dark);
            letter-spacing: -0.5px;
        }
        .metric-card .change {
            font-size: 12px;
            color: #22a65e;
            background: #e5f9ed;
            padding: 2px 8px;
            border-radius: 30px;
            display: inline-block;
            margin-top: 6px;
        }
        .metric-card .change.down {
            color: #e65a5a;
            background: #fde8e8;
        }
        .metric-card .sub {
            font-size: 12px;
            color: var(--text-light);
            margin-top: 6px;
        }
        .charts-grid {
            display: flex;
            flex-direction: column;
            gap: 14px;
            margin: 8px 0 20px 0;
        }
        .chart-box {
            background: white;
            border-radius: var(--radius);
            padding: 16px 12px 8px 12px;
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow-sm);
        }
        .chart-box .chart-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-dark);
            margin-bottom: 4px;
            display: flex;
            justify-content: space-between;
        }
        .chart-box .chart-title span {
            color: var(--text-light);
            font-weight: 400;
            font-size: 12px;
        }
        .chart-container {
            width: 100%;
            height: 160px;
        }
        .chart-container.pie {
            height: 150px;
        }
        .list-section {
            background: white;
            border-radius: var(--radius);
            padding: 16px;
            border: 1px solid var(--border-color);
            margin-top: 8px;
            box-shadow: var(--shadow-sm);
        }
        .list-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        .list-header h3 {
            font-size: 15px;
            font-weight: 600;
            color: var(--text-dark);
        }
        .list-header .action-btn {
            color: var(--primary);
            font-size: 13px;
            font-weight: 500;
            background: var(--primary-light);
            padding: 4px 12px;
            border-radius: 30px;
            cursor: pointer;
            border: none;
            transition: all 0.15s;
        }
        .list-header .action-btn:active {
            background: #d9e8ff;
            transform: scale(0.96);
        }
        .client-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #f2f4f8;
        }
        .client-item:last-child {
            border-bottom: none;
        }
        .client-info .name {
            font-size: 15px;
            font-weight: 500;
            color: var(--text-dark);
        }
        .client-info .tag {
            font-size: 11px;
            color: var(--primary);
            background: var(--primary-light);
            padding: 0 8px;
            border-radius: 20px;
            margin-left: 6px;
        }
        .client-info .detail {
            font-size: 12px;
            color: var(--text-light);
            margin-top: 2px;
        }
        .client-amount {
            font-weight: 600;
            color: var(--text-dark);
            font-size: 15px;
        }
        /* ===== 区域 & 服务商 ===== */
        .selector-scroll {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding: 4px 0 12px 0;
            scrollbar-width: none;
            -webkit-overflow-scrolling: touch;
        }
        .selector-scroll::-webkit-scrollbar {
            display: none;
        }
        .selector-tab {
            flex: 0 0 auto;
            padding: 8px 18px;
            background: white;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 500;
            color: var(--text-mid);
            border: 1px solid var(--border-color);
            cursor: pointer;
            white-space: nowrap;
            box-shadow: var(--shadow-sm);
            transition: all 0.15s;
        }
        .selector-tab.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
            box-shadow: 0 2px 12px rgba(22, 119, 255, 0.25);
        }
        .selector-tab:active {
            transform: scale(0.94);
        }

        /* ===== 区域分类导航（分段控制器 + sticky） ===== */
        .category-nav-wrapper {
            position: sticky;
            top: 0;
            z-index: 10;
            background: var(--bg);
            padding: 4px 0 8px 0;
            margin: 0 -4px;
        }
        .category-nav {
            display: flex;
            gap: 6px;
            overflow-x: auto;
            padding: 4px 4px 8px 4px;
            scrollbar-width: none;
            -webkit-overflow-scrolling: touch;
            background: white;
            border-radius: 30px;
            padding: 4px 6px;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border-color);
        }
        .category-nav::-webkit-scrollbar {
            display: none;
        }
        .category-nav .cat-tab {
            flex: 1 0 auto;
            padding: 6px 14px;
            border-radius: 30px;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-mid);
            background: transparent;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.2s;
            text-align: center;
            border: none;
            min-width: 54px;
        }
        .category-nav .cat-tab.active {
            background: var(--primary);
            color: white;
            box-shadow: 0 2px 10px rgba(22, 119, 255, 0.25);
        }
        .category-nav .cat-tab:active {
            transform: scale(0.94);
        }

        /* ===== 区域指标列表（单列横排） ===== */
        .metrics-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            background: white;
            border-radius: var(--radius);
            padding: 12px 14px;
            border: 1px solid var(--border-color);
            margin-top: 8px;
            box-shadow: var(--shadow-sm);
        }
        .metrics-list .metric-item {
            width: 100%;
            background: #fafcff;
            border-radius: 14px;
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #f0f4ff;
            cursor: pointer;
            transition: all 0.15s;
            min-height: 52px;
            position: relative;
        }
        .metrics-list .metric-item::after {
            content: '›';
            font-size: 18px;
            color: var(--text-light);
            margin-left: 8px;
            opacity: 0.5;
        }
        .metrics-list .metric-item:active {
            transform: scale(0.97);
            background: #eef4ff;
            box-shadow: var(--shadow-sm);
        }
        .metrics-list .metric-item .m-label {
            font-size: 14px;
            color: var(--text-mid);
            font-weight: 500;
            flex: 1;
            margin-right: 12px;
        }
        .metrics-list .metric-item .m-value {
            font-size: 18px;
            font-weight: 700;
            color: var(--text-dark);
            text-align: right;
            flex-shrink: 0;
            white-space: nowrap;
        }

        /* ===== 服务商网格（两列，横排） ===== */
        .metrics-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            background: white;
            border-radius: var(--radius);
            padding: 16px;
            border: 1px solid var(--border-color);
            margin-top: 8px;
            box-shadow: var(--shadow-sm);
        }
        .metric-item {
            background: #fafcff;
            border-radius: 14px;
            padding: 12px 10px;
            display: flex;
            flex-direction: column;
            border: 1px solid #f0f4ff;
            cursor: pointer;
            transition: all 0.15s;
        }
        .metric-item:active {
            transform: scale(0.96);
            background: #eef4ff;
            box-shadow: var(--shadow-sm);
        }
        .metric-item .m-label {
            font-size: 12px;
            color: var(--text-light);
            margin-bottom: 4px;
            line-height: 1.4;
        }
        .metric-item .m-value {
            font-size: 18px;
            font-weight: 700;
            color: var(--text-dark);
            word-break: break-all;
        }
        .service-summary-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            background: white;
            border-radius: var(--radius);
            padding: 16px;
            border: 1px solid var(--border-color);
            margin-bottom: 12px;
            box-shadow: var(--shadow-sm);
        }
        .service-summary-grid .metric-item {
            background: #f5f9ff;
            border-color: #e6edf8;
        }
        .breadcrumb {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 4px 0 10px 0;
            flex-wrap: wrap;
            font-size: 14px;
            color: var(--text-light);
        }
        .breadcrumb .crumb {
            color: var(--primary);
            font-weight: 500;
            cursor: pointer;
            padding: 2px 6px;
            border-radius: 12px;
            transition: background 0.15s;
        }
        .breadcrumb .crumb:active {
            background: var(--primary-light);
        }
        .breadcrumb .crumb.current {
            color: var(--text-dark);
            font-weight: 600;
            cursor: default;
        }
        .breadcrumb .sep {
            color: #d0d6e0;
        }

        /* ===== 底部导航 ===== */
        .bottom-tab {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            max-width: 420px;
            background: white;
            display: flex;
            justify-content: space-around;
            padding: 10px 0 16px 0;
            border-top: 1px solid #eef0f4;
            margin: 0 auto;
            right: 0;
            border-radius: 20px 20px 0 0;
            box-shadow: 0 -4px 20px rgba(0,0,0,0.04);
        }
        .bottom-tab .tab-item {
            font-size: 12px;
            color: var(--text-light);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            cursor: pointer;
            padding: 4px 12px;
            border-radius: 30px;
            transition: all 0.15s;
        }
        .bottom-tab .tab-item.active {
            color: var(--primary);
            font-weight: 500;
            background: var(--primary-light);
        }
        .bottom-tab .tab-item span {
            font-size: 20px;
        }
        /* ===== Toast ===== */
        .toast {
            position: fixed;
            top: 30%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.78);
            color: white;
            padding: 14px 24px;
            border-radius: 16px;
            font-size: 14px;
            z-index: 9999;
            display: none;
            backdrop-filter: blur(4px);
            text-align: center;
            max-width: 80%;
            box-shadow: 0 8px 30px rgba(0,0,0,0.2);
        }
        .toast.show {
            display: block;
            animation: fadeIn 0.2s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translate(-50%, -40%); }
            to { opacity: 1; transform: translate(-50%, -50%); }
        }

        function findRegionNode(root, id) {
            if (root.id === id) return root;
            if (root.children) {
                for (let child of root.children) {
                    const found = findRegionNode(child, id);
                    if (found) return found;
                }
            }
            return null;
        }

        function getRegionPath(root, target) {
            function dfs(node, path) {
                if (node.id === target.id) { path.push(node); return path; }
                if (node.children) {
                    for (let child of node.children) {
                        const result = dfs(child, [...path, node]);
                        if (result) return result;
                    }
                }
                return null;
            }
            return dfs(root, []);
        }

            const reasons = ['经营不善', '主动申请停用', '违规操作', '合同到期', '', '', ''];
            const rows = [];
            for (let i = 0; i < customers.length && i < 20; i++) {
                const idx = i % accounts.length;
                const isActive = i % 3 !== 0;
                rows.push({
                    name: customers[i].name || `客户${i+1}`,
                    account: accounts[idx] + (i + 1),
                    tag: tags[i % tags.length],
                    region: regionName || '华南',
                    auditTime: `2026-06-${String(12 + (i % 8)).padStart(2, '0')}`,
                    status: isActive ? '启用' : '停用',
                    stopReason: isActive ? '' : (reasons[i % reasons.length] || '其他原因'),
                    historyOrders: Math.floor(Math.random() * 50) + 5,
                    historyAmount: (Math.floor(Math.random() * 20000) + 5000).toLocaleString(),
                    periodOrders: Math.floor(Math.random() * 20) + 1,
                    periodAmount: (Math.floor(Math.random() * 8000) + 1000).toLocaleString()
                });
            }
            return rows;

                    } else {

                    }

                breadHtml = `<span class="crumb current">${node.name}</span>`;

                    const id = this.dataset.id;
